name: epgstation-custom-hwaccel

on:
  push:
    paths:
      - "src/epgstation-custom-hwaccel/**"

  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  build:
    uses: SlashNephy/actions/.github/workflows/build-docker-image.yml@3ee81e73ef206050b49635e17607c4bfe395c2b5 # v0.0.4
    with:
      image-name: ghcr.io/slashnephy/epgstation-custom-hwaccel
      context: src/epgstation-custom-hwaccel
    secrets:
      registry-password: ${{ secrets.GHCR_TOKEN }}
