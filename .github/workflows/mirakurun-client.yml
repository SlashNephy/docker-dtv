name: mirakurun-client

on:
  push:
    paths:
      - "src/mirakurun-client/**"
      - mise.toml

  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  build:
    uses: SlashNephy/actions/.github/workflows/build-docker-image.yml@520bcf4b958627d8dbcd5207721f68324d208152 # v0.0.3
    with:
      image-name: ghcr.io/slashnephy/mirakurun-client
      context: src/mirakurun-client
