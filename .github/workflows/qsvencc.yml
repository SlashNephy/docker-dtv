name: qsvencc

on:
  push:
    paths:
      - "src/qsvencc/**"

  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  build:
    uses: SlashNephy/actions/.github/workflows/build-docker-image.yml@3ee81e73ef206050b49635e17607c4bfe395c2b5 # v0.0.4
    with:
      image-name: ghcr.io/slashnephy/qsvencc
      context: src/qsvencc
